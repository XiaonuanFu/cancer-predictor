<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Sources page for the COAD Project research website."
    />
    <title>Sources | COAD Project</title>
    <link rel="icon" type="image/png" href="/assets/logo1-transparent-cropped.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-section page-sources">
    <header class="site-header project-header">
      <a class="brand" href="/" aria-label="COAD Project home">
        <span class="brand-mark" aria-hidden="true"><span></span></span>
        <span><span class="brand-title">COAD Project</span></span>
      </a>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="primary-nav">Menu</button>
      <nav class="nav" id="primary-nav" aria-label="Primary navigation">
        <a href="/" data-nav="home">Overview</a>
        <a href="/data.html" data-nav="data">COAD Data</a>
        <a href="/workflow.html" data-nav="workflow">Workflow</a>
        <a href="/model.html" data-nav="model">Model</a>
        <a href="/proteins.html" data-nav="proteins">Proteins</a>
        <a href="/chembl.html" data-nav="chembl">ChEMBL</a>
        <a href="/glossary.html" data-nav="glossary">Glossary</a>
        <a href="/sources.html" data-nav="sources">Sources</a>
        <a href="/contact.html" data-nav="contact">Contact</a>
      </nav>
    </header>

    <main class="screen-page resources-screen">
      <section class="section-band sources-section" id="sources">
        <div class="section-heading screen-heading">
          <span class="section-kicker">Sources</span>
          <h1>Data, Tools, Literature, And GitHub</h1>
        </div>
        <div class="source-filters" id="source-filters" role="tablist" aria-label="Reference filters"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Used for</th>
                <th>Link</th>
                <th>Access/import date</th>
                <th>Citation note</th>
              </tr>
            </thead>
            <tbody id="source-table"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="page-footer">This site links only to public scientific or project resources.</footer>
    <script src="/app.js"></script>
  </body>
</html>
