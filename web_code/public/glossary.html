    <title>Glossary | COAD Project</title>
    <link rel="icon" type="image/png" href="/assets/logo1-transparent-cropped.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-section page-glossary">
    <header class="site-header project-header">
      <a class="brand" href="/" aria-label="COAD Project home">
        <span class="brand-mark" aria-hidden="true"><span></span></span>
        <span><span class="brand-title">COAD Project</span></span>
      </a>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="primary-nav">Menu</button>
      <nav class="nav" id="primary-nav" aria-label="Primary navigation">
        <a href="/" data-nav="home">Overview</a>
        <a href="/data.html" data-nav="data">COAD Data</a>
        <a href="/workflow.html" data-nav="workflow">Workflow</a>
        <a href="/model.html" data-nav="model">Model</a>

    <main class="screen-page resources-screen">
      <section class="section-band glossary-section" id="glossary">

          <span class="section-kicker">Glossary</span>
          <h1>Glossary Of Biology And Computer Science Terms</h1>
        </div>
        <div class="glossary-layout">
          <aside>
            <label class="search-field">
              <span>Search terms</span>
              <input id="glossary-search" type="search" placeholder="Search terms" />
            </label>
            <div class="category-list" id="glossary-categories"></div>
            <div class="helper-card">
              <strong>Click a term to expand its definition and context.</strong>
            </div>
          </aside>
          <div class="accordion-list" id="glossary-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="page-footer">Definitions are written for high-school research learning.</footer>
    <script src="/app.js"></script>
